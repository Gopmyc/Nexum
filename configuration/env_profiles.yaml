# ┌───────────────────────────────────────────────┐
# │ DANGER LEVELS DESCRIPTION                     │
# └───────────────────────────────────────────────┘
#
# Each profile in this file is assigned a "Danger Level" from 1 to 5.
# This level estimates how risky it is to allow the profile in a sandboxed
# environment.
#
# Danger Level Criteria:
#   1 - Very safe:
#       * Minimal built-in functions allowed
#       * No access to files, OS, or environment manipulation
#       * No dynamic code execution (load, dofile, loadstring)
#
#   2 - Safe:
#       * Limited critical functions allowed (pcall, basic table/string operations)
#       * Only safe OS functions like os.time or os.date
#       * No file writing or environment changes
#
#   3 - Semi-safe:
#       * Access to some file reading or environment introspection
#       * Some critical libraries partially exposed
#       * Limited dynamic code execution may be possible
#
#   4 - Dangerous:
#       * Broad access to libraries and OS functions
#       * Partial dynamic code execution allowed
#       * Metatables can be modified
#
#   5 - Very dangerous:
#       * Full access to all functions and libraries
#       * Dynamic code execution fully allowed
#       * File system and OS commands unrestricted
#       * Metatables fully modifiable
#
# Use these danger levels to decide which profile is appropriate for a given
# sandboxed Lua environment.

# ┌────────────────────┐
# │ 'UNLOCKED' PROFILE │ Danger Level: 5
# └────────────────────┘
UNLOCKED:
  constants:
    SERVER:                true
    CLIENT:                true
    _VERSION:              true
  functions:
    assert:                true
    error:                 true
    ipairs:                true
    next:                  true
    pairs:                 true
    pcall:                 true
    select:                true
    tonumber:              true
    tostring:              true
    type:                  true
    unpack:                true
    xpcall:                true
    IsTable:               true
    IsNumber:              true
    IsString:              true
    IsBool:                true
    IsFunction:            true
    IsThread:              true
    Color:                 true
    MsgC:                  true
    PrintTable:            true
    ReadFile:              true
    LoadFileInEnvironment: true
    FilesFind:             true
    FetchURL:              true
    WriteFile:             true
    DeletePath:            true
    print:                 true
    setmetatable:          true
    getmetatable:          true
    lovr:                  true
    love:                  true
    io:                    true
  libraries:
    math:   full
    string: full
    os:     full
    table:  full
  namespaces:
    ENV:
      exposed:  true
      readonly: false
  execution:
    load:       true
    loadstring: true
    dofile:     true
    loadfile:   true
    setfenv:    true
    getfenv:    true
  metatable:
    allow_string_meta: true
    allow_table_meta:  true
  fallback:
    global:           false
    error_on_missing: true

